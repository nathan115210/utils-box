# Purpose: DRY setup: Node + pnpm + pnpm store cache + install.
# Use in all workflows to keep env consistent and speed up CI.

name: pnpm-setup
description: Setup Node, pnpm, cache store, and install dependencies

inputs:
  node-version:
    description: Node.js version
    required: false
    default: '20'
  frozen-lockfile:
    description: Use --frozen-lockfile on install
    required: false
    default: 'true'
  install:
    description: Run pnpm install
    required: false
    default: 'true'
  working-directory:
    description: Where to run install commands
    required: false
    default: '.'

runs:
  using: composite
  steps:
    # Install Node
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    # Install pnpm (respects packageManager field)
    - uses: pnpm/action-setup@v4

    # Cache pnpm store (cross-workflow speed-up)
    - name: Get pnpm store path
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-store-

    # Optional install (most jobs want this)
    - if: ${{ inputs.install == 'true' }}
      name: Install deps
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install ${{ inputs.frozen-lockfile == 'true' && '--frozen-lockfile' || '' }}
