name: Fast Checks

on:
  # Still allow manual trigger for ad-hoc use
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'vitest*.ts'
      - 'eslint.config.*'
      - '.github/actions/**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  # Avoid piling up runs for the same PR head ref
  group: fast-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Format, Lint, Typecheck, Quick Test
    runs-on: ubuntu-latest
    # Don’t run on draft PRs
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # DRY setup: Use the composite action, pnpm-setup, to set up: Node + pnpm + cache + install
      - name: Setup (Node + pnpm + cache + install)
        uses: ./.github/actions/pnpm-setup
        with:
          node-version: '20'
          install: 'true' # <-- was run-install; use 'install' to match the composite action

      # Fast “everything” pass for local parity and quick author feedback.
      - name: Prettier (check)
        run: pnpm prettier --check .

      - name: ESLint (no warnings)
        run: pnpm eslint "src/**/*.{ts,tsx}" --max-warnings=0

      - name: TypeScript (no emit)
        run: pnpm tsc -p tsconfig.json --noEmit

      - name: Unit tests (Vitest)
        run: pnpm vitest run
