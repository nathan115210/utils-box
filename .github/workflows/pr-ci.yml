# .github/workflows/pr-ci.yml
name: CI

on:
  # Run on PRs against any branch and on direct pushes to master
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'dist/**'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches: [master]
    # Skip purely docs changes to save CI time
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - 'dist/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: read

# Ensure only one CI per ref runs at a time (new one cancels old)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Prettier + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the composite action for Node + pnpm + cache + install
      - uses: ./.github/actions/pnpm-setup
        with:
          node-version: 20
          frozen-lockfile: true
          install: true

      # Check formatting only on tracked & relevant files
      - name: Prettier check (tracked files only)
        run: |
          git ls-files -z -- \
            'src/**/*.{ts,tsx}' \
            '**/*.{json,md,mdx,yml,yaml}' \
          | xargs -0 -r pnpm exec prettier --check

      # Flat-config ESLint, zero warnings allowed
      - name: ESLint (flat config)
        run: >
          pnpm exec eslint
          "src/**/*.{ts,tsx}"
          --max-warnings=0
          --no-error-on-unmatched-pattern

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/pnpm-setup
        with:
          node-version: 20
          frozen-lockfile: true
          install: true

      # Type-only compile to fail fast on TS errors
      - name: Type check
        run: pnpm exec tsc -p tsconfig.json --noEmit

      # Build library (Vite)
      - name: Vite build
        run: pnpm build

  test:
    name: Tests (Vitest)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/pnpm-setup
        with:
          node-version: 20
          frozen-lockfile: true
          install: true

      # Run unit tests
      - name: Run tests
        run: pnpm test
